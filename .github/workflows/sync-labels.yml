name: Sync repository labels

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/labels.json
      - .github/workflows/sync-labels.yml

permissions:
  contents: read
  issues: write

jobs:
  sync-labels:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create or update labels
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.parse
          import urllib.request

          repository = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          api_root = f"https://api.github.com/repos/{repository}/labels"

          with open(".github/labels.json", encoding="utf-8") as label_file:
              labels = json.load(label_file)

          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "wehunt-label-sync",
          }

          def request(method, url, payload=None):
              body = None if payload is None else json.dumps(payload).encode("utf-8")
              req = urllib.request.Request(url, data=body, headers=headers, method=method)
              try:
                  with urllib.request.urlopen(req) as response:
                      return response.status
              except urllib.error.HTTPError as error:
                  if error.code == 404:
                      return 404
                  details = error.read().decode("utf-8", errors="replace")
                  raise RuntimeError(f"GitHub API {method} {url} failed: {error.code} {details}") from error

          for label in labels:
              name = label["name"]
              payload = {
                  "name": name,
                  "color": label["color"].lstrip("#"),
                  "description": label.get("description", ""),
              }
              encoded_name = urllib.parse.quote(name, safe="")
              existing_url = f"{api_root}/{encoded_name}"

              if request("GET", existing_url) == 404:
                  request("POST", api_root, payload)
                  print(f"Created: {name}")
              else:
                  request("PATCH", existing_url, payload)
                  print(f"Updated: {name}")

          print(f"Synchronized {len(labels)} labels.")
          PY
